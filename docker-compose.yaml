x-otnode: &otnode
  env_file:
    - .env
  build:
    context: .
    dockerfile: ./Dockerfile

services:
  keeper:
    profiles: ["core"]
    image: trigg3rx/triggerx-attester:1.1.2
    container_name: triggerx-attester
    env_file:
      - .env
    command: [
        "sh",
        "./start-keeper.sh"
      ]
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - OPERATOR_ADDRESS=${OPERATOR_ADDRESS}
      - OPERATOR_RPC_PORT=${OPERATOR_RPC_PORT}
      - PUBLIC_IPV4_ADDRESS=${PUBLIC_IPV4_ADDRESS}
      - L1_RPC=${L1_RPC}
      - OTHENTIC_CLIENT_RPC_ADDRESS=https://aggregator.triggerx.network
      - HEALTH_IP_ADDRESS=https://health.triggerx.network
      - OTEL_EXPORTER_ENDPOINT=collector.triggerx.network:9051
      - KEEPER_HOST=keeper
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.triggerx/cache:/home/triggerx/data/cache
      - ~/.triggerx/logs/keeper:/home/triggerx/data/logs/keeper
    ports:
      - "${OPERATOR_RPC_PORT}:${OPERATOR_RPC_PORT}"
    restart: unless-stopped
    networks:
      - p2p
    group_add:
      - "${DOCKER_GROUP_ID:-999}"

  othentic:
    profiles: ["core"]
    container_name: triggerx-othentic
    <<: *otnode
    env_file:
      - .env
    command: [
      "run",
      "attester",
      "/ip4/82.29.164.198/tcp/9876/p2p/${OTHENTIC_BOOTSTRAP_ID}",
      "--avs-webapi", "http://keeper",
      "--avs-webapi-port", "${OPERATOR_RPC_PORT}",
      "--l1-chain", "mainnet",
      "--l2-chain", "base",
      "--json-rpc.custom-message-enabled",
      "--p2p.port", "${OPERATOR_P2P_PORT}",
      "--p2p.discovery-interval", "180000",
      "--metrics",
      "--metrics.port", "${OPERATOR_METRICS_PORT}",
      "--p2p.public-ip", "${PUBLIC_IPV4_ADDRESS}"
    ]
    environment:
      - L1_RPC=${L1_RPC}
      - L2_RPC=${L2_RPC}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - OPERATOR_ADDRESS=${OPERATOR_ADDRESS}
      - OPERATOR_P2P_PORT=${OPERATOR_P2P_PORT}
      - OPERATOR_METRICS_PORT=${OPERATOR_METRICS_PORT}
      - PUBLIC_IPV4_ADDRESS=${PUBLIC_IPV4_ADDRESS}
      - AVS_GOVERNANCE_ADDRESS=${AVS_GOVERNANCE_ADDRESS}
      - ATTESTATION_CENTER_ADDRESS=${ATTESTATION_CENTER_ADDRESS}
      - LOG_DIR=data/logs/othentic
      - OTHENTIC_BOOTSTRAP_ID=${OTHENTIC_BOOTSTRAP_ID}
      - KEEPER_HOST=keeper
    volumes:
      - ~/.triggerx/logs/othentic:/app/data/logs/othentic
    ports:
      - "${OPERATOR_P2P_PORT}:${OPERATOR_P2P_PORT}"
      - "${OPERATOR_METRICS_PORT}:${OPERATOR_METRICS_PORT}"
    depends_on:
      keeper:
        condition: service_started
    restart: unless-stopped
    networks:
      - p2p

networks:
  p2p:
    driver: bridge
